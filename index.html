<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bảo tàng Chiến thắng CM-12</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="hero slide" id="hero">
    <div class="hero__stage">
      <img class="hero__bg" src="images/honDaBac.png" alt="" />
      <div class="hero__dim" aria-hidden="true"></div>

      <img
        class="hero__asset hero__asset--monument"
        src="images/honDaBac-asset.png"
        alt="Cụm tượng đài di tích Hòn Đá Bạc"
        draggable="false"
        tabindex="0"
        role="button"
        aria-haspopup="dialog"
        aria-expanded="false"
      />

      <div class="hero__info" role="dialog" aria-modal="false" aria-hidden="true">
        <button class="hero__infoClose" type="button" aria-label="Đóng giới thiệu">×</button>
        <p class="hero__infoText">
          Di tích Hòn Đá Bạc – Trung tâm chỉ huy kế hoạch phản gián CM-12
        </p>
      </div>

      <!-- NÚT LỚN CHUYỂN SANG STORY -->
      <div class="hero__cta">
        <button class="hero__btn" id="toStoryBtn" type="button">
          Bắt đầu câu chuyện
        </button>
        <div class="hero__ctaHint">hoặc nhấn phím →</div>
      </div>

      <!-- MŨI TÊN MỜ BÊN PHẢI (tuỳ thích) -->
      <button class="nav nav--right" id="toStoryArrow" type="button" aria-label="Tới câu chuyện (story1)">
        <span class="nav__icon" aria-hidden="true"></span>
      </button>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
